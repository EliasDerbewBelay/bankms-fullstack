services:
  - type: web
    name: corebank-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: corepack enable && corepack prepare pnpm@9 --activate && pnpm install --frozen-lockfile && pnpm run render-build
    preDeployCommand: pnpm db:deploy
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: API_VERSION
        value: v1
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      # ── Set these in the Render dashboard (sync: false) ──
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
