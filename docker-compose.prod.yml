# Production stack — optional local smoke test
# Usage: set env vars in backend/.env, then:
#   docker compose -f docker-compose.prod.yml up --build

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      BACKEND_URL: http://api:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
